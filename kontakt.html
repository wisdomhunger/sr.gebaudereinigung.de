<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - SR Gebäudereinigung</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background:
                linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)),
                url("images.jpg/arbeit.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .contact-wrapper {
            width: 100%;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.97);
            padding: 38px 32px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
            animation: fadeUp 0.7s ease;
        }

        .contact-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 16px;
        }

        .contact-wrapper h1 {
            font-size: 34px;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .contact-wrapper p {
            color: #475569;
            font-size: 16px;
            margin-bottom: 26px;
            line-height: 1.6;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 15px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            background: #fff;
            transition: 0.25s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .contact-form textarea {
            min-height: 140px;
            resize: vertical;
        }

        .submit-btn {
            border: none;
            border-radius: 12px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            box-shadow: 0 12px 24px rgba(2, 132, 199, 0.25);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(2, 132, 199, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn.loading {
            opacity: 0.85;
            cursor: wait;
        }

        .btn-content {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }

        .submit-btn.loading .btn-text {
            opacity: 0.95;
        }

        .contact-note {
            margin-top: 14px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .contact-wrapper {
                padding: 28px 20px;
            }

            .contact-wrapper h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<section class="contact-page">
    <div class="contact-wrapper">
        <div class="contact-badge">SR Gebäudereinigung</div>
        <h1>Kontaktformular</h1>
        <p>
            Senden Sie uns Ihre Anfrage schnell und unkompliziert.
            Wir melden uns so bald wie möglich bei Ihnen zurück.
        </p>

        <form id="contact-form" class="contact-form">
            <input type="text" name="from_name" placeholder="Ihr Name" required>
            <input type="email" name="reply_to" placeholder="E-Mail-Adresse" required>
            <input type="text" name="phone" placeholder="Ihre Telefonnummer">
            <textarea name="message" placeholder="Beschreiben Sie kurz Ihr Anliegen..." required></textarea>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-content">
                    <span class="spinner"></span>
                    <span class="btn-text">Anfrage senden</span>
                </span>
            </button>
        </form>

        <div class="contact-note">
            Mit dem Absenden erklären Sie sich damit einverstanden, dass wir Ihre Angaben
            zur Bearbeitung Ihrer Anfrage verwenden.
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("Ph-l4_5bhIym_-BgF");

const form = document.getElementById("contact-form");
const submitBtn = document.getElementById("submit-btn");
const btnText = submitBtn.querySelector(".btn-text");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    submitBtn.classList.add("loading");
    submitBtn.disabled = true;
    btnText.textContent = "Wird gesendet...";

    emailjs.sendForm(
        "service_oscoetn",
        "template_m9ztn4b",
        form
    ).then(function() {
        form.reset();
        window.location.href = "bestaetigung.html";
    }).catch(function(error) {
        submitBtn.classList.remove("loading");
        submitBtn.disabled = false;
        btnText.textContent = "Anfrage senden";
        console.error("EmailJS Fehler:", error);
        window.location.href = "bestaetigung-fehler.html";
    });
});
</script>

</body>
</html>
