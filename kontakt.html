<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - SR Gebäudereinigung</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/sr.gebaudereinigung.de/style.css">
</head>

<body>

<section class="contact-page">

<div class="contact-wrapper">

<h1>Kontaktformular</h1>

<p>Füllen Sie das Formular aus und wir melden uns schnell bei Ihnen.</p>

<form class="contact-form">

<input type="text" placeholder="Ihr Name">

<input type="email" placeholder="Ihre Email">

<input type="tel" placeholder="Ihre Telefonnummer">

<textarea placeholder="Ihre Nachricht"></textarea>

<button type="submit">Nachricht senden</button>

</form>

</div>

</section>
</body>

</html>
